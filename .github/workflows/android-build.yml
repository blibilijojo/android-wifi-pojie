# 工作流的名称
name: Android CI Build

# 触发工作流的事件
on:
  # 当有代码 push 到 main 分支时触发
  push:
    branches: [ "main" ]
  # 当有 pull request 合并到 main 分支时触发
  pull_request:
    branches: [ "main" ]

# 定义工作任务
jobs:
  build:
    # 指定运行此任务的虚拟机环境
    runs-on: ubuntu-latest

    # 定义任务的步骤
    steps:
    # 第一步：检出代码
    # 这是标准操作，用于将你的仓库代码下载到虚拟机中
    - name: Checkout code
      uses: actions/checkout@v3

    # 第二步：设置 Java 环境
    # Android 构建需要特定的 JDK 版本
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 第三步：授予 gradlew 文件执行权限
    # 这是一个常见的修复步骤，因为 Git 不一定保存文件的执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 第四步：使用 Gradle 构建项目
    # 这会执行编译并生成一个 Debug 版本的 APK
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 第五步：上传构建产物 (APK)
    # 将生成的 APK 文件作为“产物”上传，方便你下载
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        # 产物的名称
        name: app-debug-apk
        # 要上传的文件的路径
        # 这个路径是安卓项目的标准 Debug APK 输出路径
        path: app/build/outputs/apk/debug/app-debug.apk
