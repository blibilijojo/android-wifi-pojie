<?xml version="1.0" encoding="utf-8"?>
<ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent">

    <LinearLayout
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:orientation="vertical"
        android:padding="16dp">

        <TextView
            android:layout_width="wrap_content"
            android:layout_height="wrap_content"
            android:text="Target Wi-Fi SSID:" />

        <EditText
            android:id="@+id/EtSSID"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:hint="e.g., MyHomeWiFi" />

        <TextView
            android:layout_width="wrap_content"
            android:layout_height="wrap_content"
            android:text="Dictionary:"
            android:layout_marginTop="16dp"/>

        <Button
            android:id="@+id/BtnSelectDict"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:text="Select Dictionary" />

        <TextView
            android:id="@+id/TvDictPath"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:text="No dictionary selected"
            android:padding="8dp"/>
        
        <CheckBox
            android:id="@+id/CheckUsePass"
            android:layout_width="wrap_content"
            android:layout_height="wrap_content"
            android:layout_marginTop="16dp"
            android:text="Test Single Password" />

        <EditText
            android:id="@+id/EtPass"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:hint="Enter single password"
            android:enabled="false"/>

        <TextView
            android:layout_width="wrap_content"
            android:layout_height="wrap_content"
            android:layout_marginTop="16dp"
            android:text="Timeout (seconds):" />

        <EditText
            android:id="@+id/EtTime"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:inputType="number"
            android:text="10" />

        <RadioGroup
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:layout_marginTop="8dp">
            <RadioButton
                android:id="@+id/RadioApi"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="API Mode (&lt; Android 10)"
                android:checked="true"/>
            <RadioButton
                android:id="@+id/RadioApi29"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="API 29 Mode (>= Android 10)"/>
            <RadioButton
                android:id="@+id/RadioRoot"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Root/CMD Mode"/>
        </RadioGroup>

        <Button
            android:id="@+id/BtnStart"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:text="Start"
            android:layout_marginTop="24dp" />

        <TextView
            android:layout_width="wrap_content"
            android:layout_height="wrap_content"
            android:text="Status:"
            android:layout_marginTop="16dp" />

        <TextView
            android:id="@+id/TvStatus"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:text="Idle"
            android:padding="8dp"/>
    </LinearLayout>
</ScrollView>
