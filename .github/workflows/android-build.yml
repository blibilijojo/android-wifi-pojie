# 工作流的名称
name: Android CI Build

# 触发工作流的事件
on:
  # 当有代码 push 到 main 分支时触发
  push:
    branches: [ "main" ]
  # 当有 pull request 合并到 main 分支时触发
  pull_request:
    branches: [ "main" ]

# 定义工作任务
jobs:
  build:
    # 指定运行此任务的虚拟机环境
    runs-on: ubuntu-latest

    # 定义任务的步骤
    steps:
    # 第一步：检出代码
    - name: Checkout code
      uses: actions/checkout@v4 # 建议也更新这个，v4是最新版

    # 第二步：设置 Java 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4 # 建议也更新这个，v4是最新版
      with:
        java-version: '17'
        distribution: 'temurin'

    # 第三步：授予 gradlew 文件执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 第四步：使用 Gradle 构建项目
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 第五-步：上传构建产物 (APK) - 已修正
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4 # <-- 已更新到 v4
      with:
        # 产物的名称
        name: app-debug-apk
        # 要上传的文件的路径
        path: app/build/outputs/apk/debug/app-debug.apk
